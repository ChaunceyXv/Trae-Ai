<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>New Tab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="hero-card">
      <div class="time-section">
        <div class="time" id="time">00:00</div>
        <div class="date" id="date">加载中...</div>
      </div>
      <div class="greeting" id="greeting">你好</div>
    </header>

    <section class="card search-card">
      <div class="engine-logo" id="engineLogo">Google</div>
      <form class="search-box" id="searchForm">
        <div class="engine-select" id="engineSelect">
          <button type="button" class="engine-trigger" id="engineTrigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="engine-icon" id="engineIcon">G</span>
            <svg class="engine-caret" viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <ul class="engine-menu" id="engineMenu" role="listbox"></ul>
        </div>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="搜索或输入网址..."
          autocomplete="off"
          autofocus
        />
        <button type="submit" class="search-btn" aria-label="搜索">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </form>
    </section>

    <section class="card shortcuts-card">
      <h2 class="card-title">快捷方式</h2>
      <div class="shortcuts-grid" id="shortcutsGrid"></div>
    </section>

    <footer class="footer-card">
      <div class="quote" id="quote">每一个不曾起舞的日子，都是对生命的辜负。</div>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
