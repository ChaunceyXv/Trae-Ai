<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage</title>
  <link rel="stylesheet" href="src/styles/global.css">
  <link rel="stylesheet" href="src/modules/search/search.css">
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import App from './src/core/app.js';
    import SearchModule from './src/modules/search/search.js';

    const app = new App();

    app.start([
      new SearchModule(),
    ]);

    // 全局键盘事件 → 转发到 EventBus
    document.addEventListener('keydown', (e) => {
      app.eventBus.emit('app:keydown', {
        key: e.key,
        ctrlKey: e.ctrlKey,
        metaKey: e.metaKey,
      });
    });
  </script>
</body>
</html>
